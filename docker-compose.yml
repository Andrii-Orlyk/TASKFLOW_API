services:
  taskflow-api:
    build:
      context: .
      dockerfile: src/TaskFlow.Api/Dockerfile
    container_name: taskflow-api
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=taskflow-db;Port=5432;Database=taskflow;Username=postgres;Password=postgres
      Jwt__Key: CHANGE_ME_USE_A_LONG_RANDOM_SECRET_KEY_32_CHARS_MIN
      Jwt__Issuer: TaskFlow.Api
      Jwt__Audience: TaskFlow.Client
      Jwt__ExpirationMinutes: 60
    depends_on:
      taskflow-db:
        condition: service_healthy

  taskflow-db:
    image: postgres:16
    container_name: taskflow-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  taskflow_postgres_data:
